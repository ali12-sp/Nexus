services:
  - type: web
    name: nexus-backend
    env: node
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run prisma:migrate && npm start
    healthCheckPath: /api/ready
    envVars:
      - key: NODE_VERSION
        value: 20.19.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: REFRESH_TOKEN_COOKIE_NAME
        value: nexus_rt
      - key: COOKIE_SECURE
        value: true
      - key: PAYMENT_PROVIDER
        value: MOCK
      - key: UPLOAD_DIR
        value: /opt/render/project/src/backend/uploads
      - key: MAX_FILE_SIZE_MB
        value: 10
      - key: SMTP_FROM
        value: noreply@nexus.local
      - key: OTP_EXPIRY_MINUTES
        value: 10
    disk:
      name: nexus-uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1
