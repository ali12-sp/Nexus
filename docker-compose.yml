services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - nexus-postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nexus?schema=public
      JWT_SECRET: docker-access-secret-123456
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: docker-refresh-secret-123456
      JWT_REFRESH_EXPIRES_IN: 30d
      REFRESH_TOKEN_COOKIE_NAME: nexus_rt
      COOKIE_SECURE: "false"
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE_MB: 10
      PAYMENT_PROVIDER: MOCK
      SMTP_FROM: noreply@nexus.local
      OTP_EXPIRY_MINUTES: 10
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - nexus-uploads:/app/backend/uploads

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
      NEXT_IGNORE_INCORRECT_LOCKFILE: 1
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:3000"

volumes:
  nexus-postgres-data:
  nexus-uploads:
