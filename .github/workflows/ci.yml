name: Nexus CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: 4000
      CLIENT_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus?schema=public
      JWT_SECRET: ci-access-secret-123456
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci-refresh-secret-123456
      JWT_REFRESH_EXPIRES_IN: 30d
      REFRESH_TOKEN_COOKIE_NAME: nexus_rt
      COOKIE_SECURE: "false"
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE_MB: 10
      PAYMENT_PROVIDER: MOCK
      SMTP_FROM: noreply@nexus.local
      OTP_EXPIRY_MINUTES: 10
      NEXT_IGNORE_INCORRECT_LOCKFILE: 1
      NEXT_PUBLIC_API_BASE_URL: http://localhost:4000/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost:4000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test --workspace backend

      - name: Typecheck frontend
        run: npm run typecheck --workspace frontend

      - name: Build backend
        run: npm run build --workspace backend

      - name: Build frontend
        run: npm run build --workspace frontend
